# ============================================
# Assignment 3 — settings.cfg
# Bank Mangemenent System
# ============================================

[project]
name              = bank_mgmt_system
version           = 0.1.0
description       = SecureBank subsystem with domain, services, persistence, routing, and CLI menu.
author            = Joseph Bevels
author_email      = n00661116@unf.edu
url               = https://github.com/CyberSnipe/bank-mgmt-system
environment       = development                                     # Current environment (development/staging/production)

[paths]
DATA_DIR = data/                                       
DATA_INTERNAL = data/bank_info.json                 
DATA_EXTERNAL = data/customer_info.json
     

[logging]
DEBUG = true                              # Enable debug logging (true/false)
LOGGING = logs/logging.json 

[process] 
default_currency  = USD
default_timezone  = America/New_York
